# CI de Nível 03 - Disparo após a conclusão de outra pipeline

# nome da pipeline
name: 'N3 - Execução por Deploy'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho por conclusão de outra pipeline = workflow_run

on:
  workflow_run:
    workflows: ['N1 - Execução Manual', 'N2 - Execução Agendada', 'N4 - Execução Integrada']
    types:
      - completed

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.x
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn install --frozen-lockfile --prefer-offline

      # instalação do browser do Playwright usado nos testes
      - name: Instalando browser do Playwright
        run: npx playwright install --with-deps chromium

      # executar os testes e2e
      - name: Executando testes e2e
        run: yarn run e2e

      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./playwright-report
          name: Relatório de Testes E2E